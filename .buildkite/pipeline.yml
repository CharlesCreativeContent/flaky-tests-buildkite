steps:
  - label: ":npm: Install dependencies"
    key: install
    command: npm ci
    plugins:
      - docker#v5.10.0:
          image: "node:20-alpine"
          mount-buildkite-agent: false

  - label: ":jest: Run test suite (run 1)"
    key: test-run-1
    depends_on: install
    command: npm run test:ci
    env:
      BUILDKITE_ANALYTICS_TOKEN: "${BUILDKITE_ANALYTICS_TOKEN}"
    plugins:
      - docker#v5.10.0:
          image: "node:20-alpine"
          mount-buildkite-agent: false

  - label: ":jest: Run test suite (run 2)"
    key: test-run-2
    depends_on: install
    command: npm run test:ci
    env:
      BUILDKITE_ANALYTICS_TOKEN: "${BUILDKITE_ANALYTICS_TOKEN}"
    plugins:
      - docker#v5.10.0:
          image: "node:20-alpine"
          mount-buildkite-agent: false

  - label: ":jest: Run test suite (run 3)"
    key: test-run-3
    depends_on: install
    command: npm run test:ci
    env:
      BUILDKITE_ANALYTICS_TOKEN: "${BUILDKITE_ANALYTICS_TOKEN}"
    plugins:
      - docker#v5.10.0:
          image: "node:20-alpine"
          mount-buildkite-agent: false
